server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Legacy subpath: the app used to be served under /driver-game-center/.
    # Permanently redirect old links/QR codes to the new root.
    location /driver-game-center/ {
        return 301 /;
    }
    location = /driver-game-center {
        return 301 /;
    }

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: let the React router handle client-side routes.
    # The app talks to the backend directly via VITE_API_BASE (see src/api.js),
    # so no API proxy is needed here.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
