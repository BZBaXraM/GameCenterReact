server {
    listen 3000;
    server_name _;

    # This app now lives at https://www.menyuqr.com/driver-game-center/ — it is built
    # with Vite base '/driver-game-center/' and served by the MenyuQR (Express) backend,
    # bundled into that image under public/driver-game-center/.
    #
    # The old standalone subdomain (game-center.bahram.site) is kept only as a
    # permanent redirect so existing links and already-printed QR codes still work.
    # $request_uri preserves the path + query, so /admin and ?table=N / ?cabinet=N
    # survive the hop (e.g. /?table=5 → /driver-game-center/?table=5).
    location / {
        return 301 https://www.menyuqr.com/driver-game-center$request_uri;
    }
}
