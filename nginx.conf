# Legacy standalone subdomain: keep only a permanent redirect so old links and
# already-printed QR codes still work. $request_uri preserves path + query
# (e.g. /?table=5 -> /driver-game-center/?table=5).
server {
    listen 3000;
    server_name game-center.bahram.site;

    location / {
        return 301 https://www.menyuqr.com/driver-game-center$request_uri;
    }
}

# Real traffic: menyuqr.com routes /driver-game-center here via Traefik, which
# strips that prefix before forwarding — so this app serves its own root as if
# it were a normal SPA. Built with Vite base '/driver-game-center/', so the
# browser's absolute asset requests (e.g. /driver-game-center/assets/x.js) are
# re-routed back through Traefik (prefix stripped again) and land on /assets/x.js
# here, matching this server's docroot layout.
server {
    listen 3000 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: let the React router handle client-side routes (e.g. /admin).
    # The app talks to the backend directly via VITE_API_BASE (see src/api.js),
    # so no API proxy is needed here.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
