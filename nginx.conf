server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;

    # Redirect the bare path to the trailing-slash form so the SPA loads either way.
    location = /driver-game-center {
        return 301 /driver-game-center/;
    }

    # Cache hashed static assets aggressively.
    location /driver-game-center/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: let the React router handle client-side routes.
    # The app talks to the backend directly via VITE_API_BASE (see src/api.js),
    # so no API proxy is needed here.
    location /driver-game-center/ {
        try_files $uri $uri/ /driver-game-center/index.html;
    }
}
